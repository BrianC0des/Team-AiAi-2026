name: Sync to Hugging Face Spaces

on:
  push:
    branches: [master]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME || 'devchan123' }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME || 'ScanAble' }}
        run: |
          # 1. Clean all Git history inside the runner
          rm -rf .git
          
          # 2. Re-initialize a fresh Git repository
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 3. Create a clean checkout and commit (respecting .gitignore)
          git checkout -b main
          git add .
          git commit -m "deploy: clean Hugging Face build"
          
          # 4. Force push the clean commit to Hugging Face Spaces
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main

