name: Verify Build CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend-verify:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js 20
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # 3. Install dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      # 4. Compilation / syntax check
      #    `node --check` parses every JS file without executing it.
      #    Catches syntax errors, broken requires, and malformed modules.
      - name: Syntax check — server entry point
        working-directory: backend
        run: node --check server.js

      - name: Syntax check — error handler utility
        working-directory: backend
        run: node --check utils/errorHandler.js

      # 5. Smoke-test: start the server, confirm it binds, then shut it down
      - name: Smoke test — server starts successfully
        working-directory: backend
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3

          echo "Hitting /health endpoint…"
          curl --fail --silent --show-error http://localhost:3000/health | grep '"status":"ok"'

          echo "Server responded correctly. Shutting down."
          kill $SERVER_PID
        env:
          PORT: 3000
